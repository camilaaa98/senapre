<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liderazgo Estudiantil - Bienestar del Aprendiz</title>
    <link rel="stylesheet" href="css/main.css?v=2.0.2">
    <link rel="stylesheet" href="css/admin.css?v=2.0.2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .liderazgo-header {
            background: linear-gradient(135deg, #00324D 0%, #001f2f 100%);
            color: white;
            padding: 40px;
            border-radius: 15px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .liderazgo-header::after {
            content: "\f0c0";
            font-family: "Font Awesome 5 Free";
            font-weight: 900;
            position: absolute;
            right: 30px;
            bottom: -20px;
            font-size: 150px;
            opacity: 0.1;
        }

        .grid-lideres {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .card-lider {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border-left: 5px solid #39A900;
            transition: transform 0.2s;
        }

        .card-lider:hover {
            transform: translateY(-3px);
        }

        .btn-liderazgo {
            background: #39A900;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <!-- Reutilizamos el sidebar del admin-dashboard -->
        <aside class="sidebar" id="sidebar-container">
            <!-- Cargado dinámicamente o inyectado por JS -->
        </aside>

        <main class="main-content">
            <div class="liderazgo-header">
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                    <div>
                        <h1 style="margin:0; font-size: 2rem;">Liderazgo Estudiantil</h1>
                        <p style="margin: 5px 0 0; opacity: 0.9;">Módulo de Gestión de Líderes y Representación
                            Estudiantil</p>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button onclick="cargarTodo()" class="btn-liderazgo" style="background: rgba(255,255,255,0.1);">
                            <i class="fas fa-sync"></i> Sincronizar
                        </button>
                        <button onclick="window.location.href='admin-bienestar-dashboard.html'" class="btn-liderazgo"
                            style="background: white; color: #00324D;">
                            <i class="fas fa-arrow-left"></i> Volver a Bienestar
                        </button>
                    </div>
                </div>
            </div>

            <div class="tab-container">
                <button class="tab-button active" onclick="switchTab('voceros')"><i class="fas fa-users"></i> Voceros
                    Ficha</button>
                <button class="tab-button" onclick="switchTab('representantes')"><i class="fas fa-user-shield"></i>
                    Representantes</button>
                <button class="tab-button" onclick="switchTab('enfoque')"><i class="fas fa-people-arrows"></i> Enfoque
                    Diferencial</button>
                <button class="tab-button" onclick="switchTab('reuniones')"><i class="fas fa-calendar-check"></i>
                    Reuniones</button>
            </div>

            <div id="tab-voceros" class="tab-panel active">
                <div class="grid-lideres" id="container-voceros"></div>
            </div>

            <div id="tab-representantes" class="tab-panel">
                <div class="grid-lideres" id="container-representantes"></div>
            </div>

            <div id="tab-enfoque" class="tab-panel">
                <div class="grid-lideres" id="container-enfoque"></div>
            </div>

            <div id="tab-reuniones" class="tab-panel">
                <div class="grid-lideres" id="container-reuniones"></div>
            </div>
        </main>
    </div>

    <script src="js/main.js"></script>
    <script>
        async function cargarTodo() {
            await Promise.all([
                cargarLideres('principales', 'container-voceros'),
                cargarLideres('representantes', 'container-representantes'),
                cargarLideres('enfoque', 'container-enfoque'),
                cargarReuniones()
            ]);
        }

        async function cargarLideres(filtro, containerId) {
            try {
                const res = await fetch(`api/liderazgo.php?action=getLideres&filtro=${filtro}`);
                const data = await res.json();
                if (data.success) {
                    renderLideres(data.data, containerId);
                }
            } catch (e) { console.error(e); }
        }

        async function cargarReuniones() {
            try {
                const res = await fetch('api/liderazgo.php?action=getReuniones');
                const data = await res.json();
                if (data.success) renderReuniones(data.data);
            } catch (e) { console.error(e); }
        }

        function renderLideres(lideres, containerId) {
            const container = document.getElementById(containerId);
            if (!lideres.length) {
                container.innerHTML = '<p class="italic-muted">No hay líderes registrados en esta categoría.</p>';
                return;
            }
            container.innerHTML = lideres.map(l => `
                <div class="card-lider">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                        <div>
                            <h3 style="margin:0;">${l.nombre} ${l.apellido}</h3>
                            <span class="badge-pob bg-narp">${l.tipo}</span>
                        </div>
                        <i class="fas fa-id-badge fa-2x" style="color: #cbd5e1;"></i>
                    </div>
                    <hr style="margin: 15px 0; opacity: 0.1;">
                    <p><i class="fas fa-hashtag"></i> <strong>Ficha/Area:</strong> ${l.detalle}</p>
                    <p><i class="fas fa-envelope"></i> ${l.correo || 'S/C'}</p>
                    <button class="btn-liderazgo" style="width: 100%; margin-top: 15px;" onclick="verHistorial('${l.documento}')">
                        <i class="fas fa-history"></i> Ver Seguimiento
                    </button>
                </div>
            `).join('');
        }

        function renderReuniones(reuniones) {
            const container = document.getElementById('container-reuniones');
            if (!reuniones.length) {
                container.innerHTML = '<p class="italic-muted">No hay reuniones programadas.</p>';
                return;
            }
            container.innerHTML = reuniones.map(r => `
                <div class="card-lider" style="border-left-color: #00324D;">
                    <h3 style="margin:0;">${r.titulo}</h3>
                    <p><i class="fas fa-calendar"></i> ${r.fecha} - ${r.hora}</p>
                    <p><i class="fas fa-map-marker-alt"></i> ${r.lugar || 'SENA'}</p>
                    <div style="display:flex; gap:10px; margin-top:15px;">
                        <button class="btn-liderazgo" style="flex:1;"><i class="fas fa-user-check"></i> Asistencia</button>
                        <button class="btn-liderazgo" style="background:#64748b;"><i class="fas fa-file-pdf"></i> Acta</button>
                    </div>
                </div>
            `).join('');
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        document.addEventListener('DOMContentLoaded', cargarTodo);
    </script>
</body>

</html>
