<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistencia Biométrica Grupal - SenApre</title>
    <link rel="stylesheet" href="css/main.css?v=2.0.2">
    <link rel="stylesheet" href="css/admin.css?v=2.0.2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        .scanner-active {
            border: 4px solid #39A900;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(57, 169, 0, 0.4);
            }

            70% {
                box-shadow: 0 0 0 15px rgba(57, 169, 0, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(57, 169, 0, 0);
            }
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status-presente {
            background: #dcfce7;
            color: #166534;
        }

        .status-ausente {
            background: #fee2e2;
            color: #991b1b;
        }

        .status-espera {
            background: #fef3c7;
            color: #92400e;
        }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="assets/img/asi.png" alt="SenApre Logo" class="logo-principal">
                <h3>Bienestar</h3>
                <div class="sidebar-subtitle">Asistencia</div>
            </div>
            <!-- El Menú se maneja dinámicamente o por el botón de Volver global -->
        </aside>

        <main class="main-content">
            <div class="content-header">
                <div class="header-left">
                    <h1 class="content-title">Reconocimiento Facial Grupal</h1>
                    <p class="content-description">Detección biométrica facial para líderes y voceros</p>
                </div>
            </div>

            <div class="card" style="margin-bottom: 25px;">
                <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 20px; align-items: flex-end;">
                    <div class="form-group">
                        <label class="form-label">Seleccionar Reunión Activa</label>
                        <select id="reunionSelect" class="form-control" onchange="cargarLideresYAsistencia()">
                            <option value="">Cargando reuniones...</option>
                        </select>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button onclick="generarPDF()" class="btn-primary" style="background: #ef4444; flex: 1;">
                            <i class="fas fa-file-pdf"></i> Reporte PDF
                        </button>
                    </div>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 25px;">
                <!-- Panel de Escaneo -->
                <div class="card" id="scannerPanel">
                    <div class="card-header">
                        <h3 class="card-title">Escáner Activo</h3>
                    </div>
                    <div style="text-align: center; padding: 40px 20px;">
                        <div id="sensorIcon" class="scanner-active"
                            style="width: 160px; height: 160px; background: #f8fafc; border: 2px dashed #39A900; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; position: relative; overflow: hidden;">
                            <i class="fas fa-user-shield" style="font-size: 5rem; color: #39A900; opacity: 0.3;"></i>
                            <div
                                style="position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: #39A900; box-shadow: 0 0 10px #39A900; animation: scan 2s infinite ease-in-out;">
                            </div>
                        </div>
                        <h4 id="scannerStatus">Buscando Rostro...</h4>
                        <p style="font-size: 0.9rem; color: #64748b; margin-top: 10px;">Encuadre el rostro en el
                            recuadro verde</p>

                        <div style="margin-top: 30px; border-top: 1px solid #e2e8f0; padding-top: 20px;">
                            <label class="form-label">Registro Manual Rápido (Doc)</label>
                            <input type="text" id="manualDoc" class="form-control"
                                placeholder="Presione Enter para registrar"
                                onkeypress="if(event.key === 'Enter') registrarManual()">
                        </div>
                    </div>
                </div>

                <!-- Listado en Tiempo Real -->
                <div class="table-container">
                    <div class="table-header">
                        <h2 class="table-title">Estado de Asistencia</h2>
                    </div>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Líder</th>
                                <th>Ficha</th>
                                <th>Tipo</th>
                                <th>Estado</th>
                                <th>Hora</th>
                            </tr>
                        </thead>
                        <tbody id="listaAsistencia">
                            <tr>
                                <td colspan="5" style="text-align: center; padding: 30px;">Seleccione una reunión</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="js/main.js"></script>
    <script>
        let leaders = [];
        let attendance = [];

        document.addEventListener('DOMContentLoaded', () => {
            cargarReuniones();
            // Simular inicio de escáner
            setTimeout(() => {
                document.getElementById('scannerStatus').textContent = 'Listo para leer';
            }, 1000);
        });

        async function cargarReuniones() {
            try {
                const res = await fetch('api/bienestar.php?action=getReuniones');
                const r = await res.json();
                if (r.success) {
                    const sel = document.getElementById('reunionSelect');
                    sel.innerHTML = '<option value="">-- Seleccione una reunión --</option>';
                    r.data.forEach(m => {
                        sel.innerHTML += `<option value="${m.id}">${m.titulo} (${m.fecha})</option>`;
                    });
                }
            } catch (e) { console.error(e); }
        }

        async function cargarLideresYAsistencia() {
            const id = document.getElementById('reunionSelect').value;
            if (!id) return;

            try {
                const [resLid, resAsis] = await Promise.all([
                    fetch('api/bienestar.php?action=getLideres&filtro=todos'),
                    fetch(`api/bienestar.php?action=getReunionAsistencia&id=${id}`)
                ]);

                const rLid = await resLid.json();
                const rAsis = await resAsis.json();

                if (rLid.success) {
                    leaders = rLid.data;
                    attendance = rAsis.success ? rAsis.data : [];
                    renderLista();
                }
            } catch (e) { console.error(e); }
        }

        function renderLista() {
            const tbody = document.getElementById('listaAsistencia');
            const asisMap = {};
            attendance.forEach(a => asisMap[a.id_aprendiz] = a);

            tbody.innerHTML = leaders.map(l => {
                const hasAsis = asisMap[l.documento];
                return `
                    <tr>
                        <td><strong>${l.nombre} ${l.apellido}</strong><br><small>${l.documento}</small></td>
                        <td>${l.detalle}</td>
                        <td><small>${l.tipo}</small></td>
                        <td>
                            <span class="status-badge ${hasAsis ? 'status-presente' : 'status-espera'}">
                                ${hasAsis ? '✓ REGISTRADO' : 'PENDIENTE'}
                            </span>
                        </td>
                        <td><small>${hasAsis ? hasAsis.fecha_registro.split(' ')[1] : '-'}</small></td>
                    </tr>
                `;
            }).join('');
        }

        async function registrarManual() {
            const doc = document.getElementById('manualDoc').value;
            const rid = document.getElementById('reunionSelect').value;
            if (!doc || !rid) return;

            try {
                const res = await fetch('api/bienestar.php?action=registrarAsistencia', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id_reunion: rid, id_aprendiz: doc, estado: 'asistio' })
                });
                const r = await res.json();
                if (r.success) {
                    document.getElementById('manualDoc').value = '';
                    cargarLideresYAsistencia();
                    // Feedback visual
                    const sensor = document.getElementById('sensorIcon');
                    sensor.style.background = '#dcfce7';
                    setTimeout(() => sensor.style.background = '#f8fafc', 500);
                } else {
                    alert(r.message);
                }
            } catch (e) { alert('Error al registrar'); }
        }

        function generarPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            const sel = document.getElementById('reunionSelect');
            if (!sel.value) return alert('Seleccione una reunión primero');
            const textoReunion = sel.options[sel.selectedIndex].text;

            doc.setFontSize(18);
            doc.setTextColor(57, 169, 0);
            doc.text('Reporte de Asistencia Biometrizada', 14, 20);

            doc.setFontSize(11);
            doc.setTextColor(100);
            doc.text(`Reunión: ${textoReunion}`, 14, 28);
            doc.text(`Fecha Generación: ${new Date().toLocaleString()}`, 14, 34);

            const asisMap = {};
            attendance.forEach(a => asisMap[a.id_aprendiz] = a);

            const rows = leaders.map(l => [
                `${l.nombre} ${l.apellido}`,
                l.documento,
                l.detalle,
                l.tipo,
                asisMap[l.documento] ? 'ASISTIÓ' : 'AUSENTE',
                asisMap[l.documento] ? asisMap[l.documento].fecha_registro : '-'
            ]);

            doc.autoTable({
                head: [['Aprendiz', 'Documento', 'Ficha', 'Cargo', 'Estado', 'Fecha/Hora']],
                body: rows,
                startY: 40,
                theme: 'striped',
                headStyles: { fillColor: [0, 50, 77] }
            });

            doc.save(`Asistencia_Lideres_${sel.value}.pdf`);
        }
    </script>
</body>

</html>
