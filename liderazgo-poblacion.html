<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tipo de Población - Liderazgo SenApre</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/liderazgo-premium.css?v=2.0.0">
    <link rel="stylesheet" href="css/liderazgo-layout.css?v=1.0.0">
    <link rel="stylesheet" href="css/liderazgo-main.css?v=2.1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="lid-container">
        <!-- SIDEBAR -->
        <aside class="lid-sidebar" id="lid-sidebar">
            <div class="lid-sb-header">
                <img src="assets/img/asi.png" alt="SenApre" class="lid-sb-logo">
                <div class="lid-sb-brand">SenApre</div>
                <div class="lid-sb-role" id="lid-role-display">Liderazgo</div>
            </div>
            <!-- Mismo nav que liderazgo.html -->
            <nav class="lid-sb-nav">
                <a href="liderazgo.html" class="lid-sb-link">
                    <i class="fas fa-th-large"></i><span>Panel Principal</span>
                </a>
                <a href="liderazgo-poblacion.html" class="lid-sb-link active">
                    <i class="fas fa-layer-group"></i><span>Tipo de Población</span>
                </a>
                <a href="asistencia-liderazgo.html" class="lid-sb-link">
                    <i class="fas fa-clipboard-user"></i><span>Asistencia</span>
                </a>
            </nav>
        </aside>

        <main class="lid-main">
            <header class="lid-topbar">
                <button class="lid-hamburger" onclick="document.getElementById('lid-sidebar').classList.toggle('open')">
                    <i class="fas fa-bars"></i>
                </button>
                <span class="lid-topbar-title">Tipo de Población</span>
                <div class="lid-topbar-user" id="lid-topbar-user"></div>
            </header>

            <div class="premium-header">
                <div class="premium-header-content">
                    <div class="premium-header-icon" style="background: linear-gradient(135deg, #39A900, #2d8500);"><i class="fas fa-users-viewfinder"></i></div>
                    <div>
                        <h1 class="premium-header-title">Enfoque Diferencial</h1>
                        <p class="premium-header-desc">Analítica y gestión de aprendices por diversidad</p>
                    </div>
                </div>
            </div>

            <!-- Dashboard Analytics -->
            <div class="reports-grid" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap:20px; margin-bottom:30px;">
                <div class="glass-card">
                    <h3 style="margin-bottom:15px; text-align:center;">% Aprendices por Población</h3>
                    <div style="max-width:220px; margin:0 auto;">
                        <canvas id="chartPoblacion" height="200"></canvas>
                    </div>
                </div>
                <div class="glass-card">
                    <h3 style="margin-bottom:15px;">Top 5 Fichas (Lectivas)</h3>
                    <canvas id="chartFichas" height="200"></canvas>
                </div>
            </div>

            <div class="pob-grid" id="pob-grid-categorias"></div>
        </main>
    </div>

    <!-- Modal: Detalle con PDF -->
    <div class="modal-overlay" id="modalPoblacion" style="display:none;">
        <div class="modal-glass modal-wide" style="max-width: 950px;">
            <div class="modal-pob-header" style="display:flex; align-items:center; gap:1.5rem; margin-bottom:1.5rem;">
                <div id="modal-pob-icon" class="pob-cat-icon"></div>
                <div>
                    <h2 class="modal-title" id="modal-pob-titulo">Categoría</h2>
                    <p id="vocero-enfoque-lbl" style="color:var(--lid-primary); font-weight:600; font-size:0.9rem; margin-top:5px;"></p>
                </div>
                <button class="btn-lid btn-lid-cancel" onclick="document.getElementById('modalPoblacion').style.display='none'" style="margin-left:auto;">&times;</button>
            </div>

            <div class="pob-search-bar" style="display:flex; gap:10px; margin-bottom:1rem;">
                <input type="text" id="pob-search" class="form-input" placeholder="Buscar..." oninput="PoblacionUI.filtrar(this.value)" style="flex:1">
                <button class="btn-lid btn-lid-secondary" onclick="PoblacionUI.addAprendiz()">
                    <i class="fas fa-plus"></i> Agregar Aprendiz
                </button>
            </div>

            <div class="pob-table-wrap">
                <table class="pob-table">
                    <thead><tr><th>Documento</th><th>Nombre</th><th>Ficha</th><th>Estado</th></tr></thead>
                    <tbody id="pob-tabla-body"></tbody>
                </table>
            </div>

            <div class="modal-pob-footer" style="display:flex; justify-content:space-between; align-items:center; margin-top:1.5rem;">
                <span id="modal-pob-total">0 registros</span>
                <button class="btn-lid btn-lid-primary" onclick="PoblacionUI.exportPDF()">
                    <i class="fas fa-file-pdf"></i> Descargar PDF Oficial
                </button>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        const CATEGORIAS = [
            { key: 'mujer', label: 'Mujer', icon: 'fas fa-venus', bg: '#fce7f3', col: '#be185d' },
            { key: 'indigena', label: 'Indígena', icon: 'fas fa-feather-alt', bg: '#fef3c7', col: '#b45309' },
            { key: 'narp', label: 'NARP', icon: 'fas fa-globe-africa', bg: '#ede9fe', col: '#6d28d9' },
            { key: 'campesino', label: 'Campesino', icon: 'fas fa-tractor', bg: '#d1fae5', col: '#065f46' },
            { key: 'lgbtiq', label: 'LGBTIQ+', icon: 'fas fa-rainbow', bg: '#e0f2fe', col: '#0369a1' },
            { key: 'discapacidad', label: 'Discapacidad', icon: 'fas fa-wheelchair', bg: '#fee2e2', col: '#b91c1c' }
        ];

        let todosAprendices = [];
        let currentCatData = [];
        let vocerosEnfoqueMap = {};

        const PoblacionUI = {
            async init() {
                const user = authSystem.getCurrentUser();
                document.getElementById('lid-topbar-user').textContent = `${user.nombre} ${user.apellido}`;
                
                try {
                    const resR = await fetch('api/liderazgo.php?action=getResponsable&area=voceros_y_representantes').then(r => r.json());
                    if (resR.success && resR.data) {
                        document.getElementById('lid-role-display').innerHTML = `
                            <strong style="color:#6ee47b;display:block;">Liderazgo</strong>
                            <span style="font-size:0.75rem;opacity:0.9;color:white;display:block;margin-top:2px;text-transform:uppercase;">${resR.data.nombre} ${resR.data.apellido}</span>
                            <span style="font-size:0.65rem;opacity:0.6;color:white;display:block;">${resR.data.correo}</span>
                        `;
                    }
                } catch(e) {}

                await this.fetchData();
                this.renderGrid();
                this.renderCharts();
            },

            async fetchData() {
                const [resA, resV] = await Promise.all([
                    fetch('api/aprendices.php?limit=-1').then(r => r.json()),
                    fetch('api/liderazgo.php?action=getLideres&filtro=enfoque').then(r => r.json())
                ]);
                
                todosAprendices = resA.success ? resA.data : [];
                if (resV.success) {
                    resV.data.forEach(v => {
                        const cat = v.tipo.replace('Vocero Enfoque ', '').toLowerCase();
                        vocerosEnfoqueMap[cat] = `${v.nombre} ${v.apellido}`;
                    });
                }
            },

            renderGrid() {
                 document.getElementById('pob-grid-categorias').innerHTML = CATEGORIAS.map(c => {
                    const count = todosAprendices.filter(a => a.tipo_poblacion === c.label).length;
                    return `
                    <div class="glass-card" onclick="PoblacionUI.abrirDetalle('${c.key}')" style="cursor:pointer">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div style="background:${c.bg}; color:${c.col}; width:50px; height:50px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:1.5rem;">
                                <i class="${c.icon}"></i>
                            </div>
                            <span style="font-size:2rem; font-weight:800; font-family:'Outfit';">${count}</span>
                        </div>
                        <h3 style="margin-top:1rem;">${c.label}</h3>
                    </div>`;
                }).join('');
            },

            abrirDetalle(key) {
                const cat = CATEGORIAS.find(c => c.key === key);
                document.getElementById('modal-pob-titulo').textContent = cat.label;
                const vocero = vocerosEnfoqueMap[key] || 'No asignado';
                document.getElementById('vocero-enfoque-lbl').innerHTML = `<i class="fas fa-crown"></i> Vocero: ${vocero}`;
                
                currentCatData = todosAprendices.filter(a => a.tipo_poblacion === cat.label);
                this.renderTabla(currentCatData);
                document.getElementById('modalPoblacion').style.display = 'flex';
                this.currentKey = key;
            },

            renderTabla(lista) {
                const tbody = document.getElementById('pob-tabla-body');
                tbody.innerHTML = lista.map(a => `
                    <tr>
                        <td><strong>${a.documento}</strong></td>
                        <td>${a.nombre} ${a.apellido}</td>
                        <td>${a.numero_ficha || 'N/A'}</td>
                        <td><span class="status-pill ${a.estado === 'LECTIVA' ? 'status-success' : ''}">${a.estado}</span></td>
                    </tr>
                `).join('');
                document.getElementById('modal-pob-total').textContent = `${lista.length} registros`;
            },

            renderCharts() {
                // Chart % Población
                const ctx1 = document.getElementById('chartPoblacion').getContext('2d');
                new Chart(ctx1, {
                    type: 'doughnut',
                    data: {
                        labels: CATEGORIAS.map(c => c.label),
                        datasets: [{
                            data: CATEGORIAS.map(c => todosAprendices.filter(a => a.tipo_poblacion === c.label).length),
                            backgroundColor: CATEGORIAS.map(c => c.bg),
                            borderColor: CATEGORIAS.map(c => c.col)
                        }]
                    }
                });

                // Chart Top 5 Fichas Lectivas (Solo con población vulnerable)
                const pobVulnerable = todosAprendices.filter(a => a.estado === 'LECTIVA' && a.tipo_poblacion && a.tipo_poblacion !== 'Ninguna' && a.tipo_poblacion !== 'null');
                const counts = {};
                pobVulnerable.forEach(a => {
                    const f = a.numero_ficha;
                    if (f) counts[f] = (counts[f] || 0) + 1;
                });
                const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]).slice(0, 5);

                const ctx2 = document.getElementById('chartFichas').getContext('2d');
                new Chart(ctx2, {
                    type: 'bar',
                    data: {
                        labels: sorted.map(s => s[0]),
                        datasets: [{
                            label: 'Aprendices de Población',
                            data: sorted.map(s => s[1]),
                            backgroundColor: '#39A900',
                            borderRadius: 4
                        }]
                    },
                    options: {
                        scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
                    }
                });
            },

            exportPDF() {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                const cat = CATEGORIAS.find(c => c.key === this.currentKey);
                const vocero = vocerosEnfoqueMap[this.currentKey] || 'No asignado';

                // Títulos
                doc.setFontSize(18);
                doc.setTextColor(57, 169, 0); // SENA Green
                doc.text('REPORTE OFICIAL DE POBLACIÓN - SENAPRE', 105, 20, { align: 'center' });
                
                doc.setFontSize(12);
                doc.setTextColor(0, 50, 77); // Navy
                doc.text(`Categoría: ${cat.label}`, 20, 35);
                doc.text(`Vocero de Enfoque: ${vocero}`, 20, 42);
                doc.text(`Fecha: ${new Date().toLocaleDateString()}`, 160, 35);

                const tableData = currentCatData.map(a => [a.documento, `${a.nombre} ${a.apellido}`, a.numero_ficha, a.estado]);
                
                doc.autoTable({
                    startY: 50,
                    head: [['Documento', 'Aprendiz', 'Ficha', 'Estado']],
                    body: tableData,
                    theme: 'grid',
                    headStyles: { fillColor: [57, 169, 0] }
                });

                doc.save(`Reporte_${cat.label}_SenApre.pdf`);
            },

            addAprendiz() {
                alert('Funcionalidad de asignación para la categoría: ' + this.currentKey);
            }
        };

        PoblacionUI.init();
    </script>
</body>
</html>
