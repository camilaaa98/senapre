<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión Biométrica Liderazgo - SenApre</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css?v=2.1.0">
    <link rel="stylesheet" href="css/admin.css?v=2.1.0">
    <link rel="stylesheet" href="css/liderazgo-premium.css?v=1.1.0">
    <link rel="stylesheet" href="css/liderazgo-main.css?v=2.1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-light">
    <!-- Header -->
    <div class="page-header" style="background:var(--lid-secondary); color:white; padding:1.5rem; margin-bottom:20px;">
        <div style="display:flex; justify-content:space-between; align-items:center; max-width:1200px; margin:0 auto;">
            <div style="display:flex; align-items:center; gap:15px;">
                <a href="liderazgo.html" class="btn-lid btn-lid-secondary" style="color:#00324d; border-color:white;">
                    <i class="fas fa-arrow-left"></i> Volver
                </a>
                <div>
                    <h1 style="margin:0; font-size:1.5rem;"><i class="fas fa-fingerprint"></i> Gestión Biométrica Liderazgo</h1>
                    <p style="margin:5px 0 0; opacity:0.8; font-size:0.9rem;">Registro y control de reconocimiento facial</p>
                </div>
            </div>
            <div style="display:flex; gap:10px;">
                <button onclick="sincronizarRegistros()" class="btn-lid btn-lid-primary">
                    <i class="fas fa-sync"></i> Sincronizar
                </button>
                <button onclick="recargarDatos()" class="btn-lid btn-lid-accent">
                    <i class="fas fa-refresh"></i> Actualizar
                </button>
            </div>
        </div>
    </div>

    <!-- Contenido Principal -->
    <div class="container" style="max-width:1200px; margin:0 auto; padding:0 20px;">
        
        <!-- Estadísticas -->
        <div class="stats-grid" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap:20px; margin-bottom:30px;">
            <div class="glass-card stat-card" style="text-align:center; padding:20px;">
                <div class="stat-icon" style="font-size:2rem; color:var(--lid-primary); margin-bottom:10px;">
                    <i class="fas fa-users"></i>
                </div>
                <div class="stat-number" id="total-lideres" style="font-size:2rem; font-weight:800; color:var(--lid-text-primary);">0</div>
                <div class="stat-label" style="color:var(--lid-text-muted); font-size:0.9rem;">Total Líderes</div>
            </div>
            
            <div class="glass-card stat-card" style="text-align:center; padding:20px; border-left:4px solid #10b981;">
                <div class="stat-icon" style="font-size:2rem; color:#10b981; margin-bottom:10px;">
                    <i class="fas fa-check-circle"></i>
                </div>
                <div class="stat-number" id="registrados" style="font-size:2rem; font-weight:800; color:#10b981;">0</div>
                <div class="stat-label" style="color:var(--lid-text-muted); font-size:0.9rem;">Registrados</div>
            </div>
            
            <div class="glass-card stat-card" style="text-align:center; padding:20px; border-left:4px solid #ef4444;">
                <div class="stat-icon" style="font-size:2rem; color:#ef4444; margin-bottom:10px;">
                    <i class="fas fa-exclamation-triangle"></i>
                </div>
                <div class="stat-number" id="no-registrados" style="font-size:2rem; font-weight:800; color:#ef4444;">0</div>
                <div class="stat-label" style="color:var(--lid-text-muted); font-size:0.9rem;">Sin Registro</div>
            </div>
            
            <div class="glass-card stat-card" style="text-align:center; padding:20px; border-left:4px solid #f59e0b;">
                <div class="stat-icon" style="font-size:2rem; color:#f59e0b; margin-bottom:10px;">
                    <i class="fas fa-pause-circle"></i>
                </div>
                <div class="stat-number" id="inactivos" style="font-size:2rem; font-weight:800; color:#f59e0b;">0</div>
                <div class="stat-label" style="color:var(--lid-text-muted); font-size:0.9rem;">Inactivos</div>
            </div>
        </div>

        <!-- Filtros -->
        <div class="glass-card" style="margin-bottom:20px; padding:15px;">
            <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:15px;">
                <div style="display:flex; gap:10px; align-items:center;">
                    <label style="font-weight:600; color:var(--lid-text-primary);">Filtrar por estado:</label>
                    <select id="filtro-estado" onchange="filtrarLideres()" class="form-control" style="padding:8px 12px; border:1px solid #ddd; border-radius:5px;">
                        <option value="todos">Todos</option>
                        <option value="registrado">Registrados</option>
                        <option value="no_registrado">Sin Registro</option>
                        <option value="inactivo">Inactivos</option>
                    </select>
                    
                    <input type="text" id="buscar-lider" placeholder="Buscar líder..." onkeyup="filtrarLideres()" 
                           class="form-control" style="padding:8px 12px; border:1px solid #ddd; border-radius:5px; min-width:200px;">
                </div>
                
                <div class="batch-actions" id="batch-actions" style="display:none;">
                    <span id="selection-count" style="margin-right:10px; color:var(--lid-text-muted);">0 seleccionados</span>
                    <button onclick="registrarSeleccionados()" class="btn-lid btn-lid-primary" style="padding:8px 15px;">
                        <i class="fas fa-camera"></i> Registrar Seleccionados
                    </button>
                    <button onclick="limpiarSeleccion()" class="btn-lid btn-lid-secondary" style="padding:8px 15px;">
                        <i class="fas fa-times"></i> Limpiar
                    </button>
                </div>
            </div>
        </div>

        <!-- Lista de Líderes -->
        <div class="glass-card">
            <div class="card-header" style="padding:15px; border-bottom:1px solid #e5e7eb; display:flex; justify-content:space-between; align-items:center;">
                <h3 style="margin:0; color:var(--lid-text-primary);"><i class="fas fa-list"></i> Lista de Líderes</h3>
                <div style="display:flex; gap:10px;">
                    <button onclick="seleccionarTodos()" class="btn-lid btn-lid-outline" style="padding:5px 10px; font-size:0.9rem;">
                        <i class="fas fa-check-square"></i> Seleccionar Todos
                    </button>
                </div>
            </div>
            
            <div id="lideres-container" style="padding:15px;">
                <div style="text-align:center; padding:40px; color:var(--lid-text-muted);">
                    <i class="fas fa-spinner fa-spin" style="font-size:2rem; margin-bottom:15px;"></i>
                    <p>Cargando líderes...</p>
                </div>
            </div>
        </div>

    </div>

    <!-- Scripts -->
    <script src="js/main.js"></script>
    <script src="js/liderazgo/registro-facial.js"></script>
    <script>
        let todosLosLideres = [];
        let lideresFiltrados = [];
        let seleccionados = new Set();

        // Inicializar cuando cargue la página
        document.addEventListener('DOMContentLoaded', async () => {
            await RegistroFacialLider.init();
            await cargarLideresBiometricos();
        });

        /**
         * Cargar líderes con estado biométrico
         */
        async function cargarLideresBiometricos() {
            try {
                const response = await fetch('api/registro-biometrico-lider.php?action=lideresEstado');
                const data = await response.json();
                
                if (data.success) {
                    todosLosLideres = data.lideres;
                    lideresFiltrados = [...todosLosLideres];
                    
                    actualizarEstadisticas(data.estadisticas);
                    renderizarLideres();
                    
                    console.log(`Líderes cargados: ${data.lideres.length}`);
                } else {
                    throw new Error(data.error || 'Error cargando líderes');
                }
                
            } catch (error) {
                console.error('Error cargando líderes:', error);
                document.getElementById('lideres-container').innerHTML = `
                    <div style="text-align:center; padding:40px; color:#ef4444;">
                        <i class="fas fa-exclamation-triangle" style="font-size:2rem; margin-bottom:15px;"></i>
                        <p>Error cargando datos: ${error.message}</p>
                    </div>
                `;
            }
        }

        /**
         * Actualizar estadísticas
         */
        function actualizarEstadisticas(estadisticas) {
            document.getElementById('total-lideres').textContent = estadisticas.total;
            document.getElementById('registrados').textContent = estadisticas.registrados;
            document.getElementById('no-registrados').textContent = estadisticas.no_registrados;
            document.getElementById('inactivos').textContent = estadisticas.inactivos;
        }

        /**
         * Renderizar lista de líderes
         */
        function renderizarLideres() {
            const container = document.getElementById('lideres-container');
            
            if (lideresFiltrados.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center; padding:40px; color:var(--lid-text-muted);">
                        <i class="fas fa-search" style="font-size:2rem; margin-bottom:15px;"></i>
                        <p>No se encontraron líderes con los filtros actuales</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = lideresFiltrados.map(lider => {
                const isSelected = seleccionados.has(lider.documento);
                const estado = lider.estado_biometrico;
                
                // Configurar colores e iconos según estado
                let estadoConfig = {};
                switch (estado) {
                    case 'registrado':
                        estadoConfig = {
                            color: '#10b981',
                            icono: 'fa-check-circle',
                            texto: 'Registrado',
                            borderColor: 'border-l-green-500'
                        };
                        break;
                    case 'no_registrado':
                        estadoConfig = {
                            color: '#ef4444',
                            icono: 'fa-exclamation-triangle',
                            texto: 'Sin Registro',
                            borderColor: 'border-l-red-500'
                        };
                        break;
                    case 'inactivo':
                        estadoConfig = {
                            color: '#f59e0b',
                            icono: 'fa-pause-circle',
                            texto: 'Inactivo',
                            borderColor: 'border-l-yellow-500'
                        };
                        break;
                }
                
                return `
                    <div class="leader-card glass-card ${estadoConfig.borderColor} ${isSelected ? 'selected' : ''}" 
                         style="margin-bottom:15px; padding:15px; transition:all 0.3s; ${isSelected ? 'background: #e0f2fe;' : ''}">
                        <div style="display:flex; align-items:center; gap:15px;">
                            <!-- Checkbox de selección -->
                            <input type="checkbox" 
                                   class="leader-checkbox" 
                                   data-documento="${lider.documento}"
                                   ${isSelected ? 'checked' : ''}
                                   onchange="toggleSeleccion('${lider.documento}')"
                                   style="width:18px; height:18px; cursor:pointer;">
                            
                            <!-- Foto o Avatar -->
                            <div style="width:50px; height:50px; border-radius:50%; background:linear-gradient(135deg,var(--lid-primary),var(--lid-secondary)); display:flex; align-items:center; justify-content:center; color:white; font-weight:700; font-size:1.2rem;">
                                ${lider.foto_url ? `<img src="${lider.foto_url}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">` : lider.nombres.charAt(0)}
                            </div>
                            
                            <!-- Información -->
                            <div style="flex:1;">
                                <div style="font-weight:600; color:var(--lid-text-primary); font-size:1rem;">${lider.nombre_completo}</div>
                                <div style="font-size:0.85rem; color:var(--lid-text-muted); margin-top:2px;">
                                    ${lider.tipo_liderazgo} | Ficha: ${lider.ficha || 'N/A'}
                                </div>
                                <div style="font-size:0.8rem; color:var(--lid-text-muted); margin-top:2px;">
                                    Documento: ${lider.documento}
                                </div>
                            </div>
                            
                            <!-- Estado Biométrico -->
                            <div style="text-align:center; min-width:120px;">
                                <div style="font-size:0.8rem; color:${estadoConfig.color}; font-weight:600;">
                                    <i class="fas ${estadoConfig.icono}" style="margin-right:5px;"></i>
                                    ${estadoConfig.texto}
                                </div>
                                ${lider.facial_fecha ? `<div style="font-size:0.7rem; color:var(--lid-text-muted); margin-top:2px;">${new Date(lider.facial_fecha).toLocaleDateString()}</div>` : ''}
                            </div>
                            
                            <!-- Acciones -->
                            <div style="display:flex; gap:8px;">
                                ${lider.puede_registrar ? `
                                    <button onclick="abrirRegistroFacial(${JSON.stringify(lider).replace(/"/g, '&quot;')})" 
                                            class="btn-lid btn-lid-primary" 
                                            style="padding:8px 12px; font-size:0.85rem;">
                                        <i class="fas fa-camera"></i> Registrar
                                    </button>
                                ` : ''}
                                
                                ${lider.imagen_path ? `
                                    <button onclick="verFoto('${lider.imagen_path}')" 
                                            class="btn-lid btn-lid-outline" 
                                            style="padding:8px 12px; font-size:0.85rem;">
                                        <i class="fas fa-eye"></i> Ver
                                    </button>
                                ` : ''}
                                
                                ${lider.facial_id ? `
                                    <button onclick="eliminarRegistro('${lider.documento}')" 
                                            class="btn-lid btn-lid-danger" 
                                            style="padding:8px 12px; font-size:0.85rem;">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            actualizarBatchActions();
        }

        /**
         * Abrir modal de registro facial
         */
        function abrirRegistroFacial(lider) {
            RegistroFacialLider.openModal(lider);
        }

        /**
         * Ver foto registrada
         */
        function verFoto(imagenBase64) {
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.9);
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 2000;
                cursor: pointer;
            `;
            
            modal.innerHTML = `
                <div style="position: relative; max-width: 90%; max-height: 90%;">
                    <img src="${imagenBase64}" style="max-width:100%; max-height:100%; border-radius:10px; border:3px solid white;">
                    <button onclick="this.parentElement.parentElement.remove()" 
                            style="position: absolute; top: -15px; right: -15px; background: #ef4444; color: white; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 1.2rem;">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            `;
            
            modal.onclick = (e) => {
                if (e.target === modal) modal.remove();
            };
            
            document.body.appendChild(modal);
        }

        /**
         * Eliminar registro facial
         */
        async function eliminarRegistro(documento) {
            if (!confirm('¿Está seguro de desactivar este registro facial?')) return;
            
            try {
                const response = await fetch(`api/registro-biometrico-lider.php?action=eliminarRegistro&documento=${documento}`, {
                    method: 'DELETE'
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showNotification('success', result.message);
                    await cargarLideresBiometricos();
                } else {
                    throw new Error(result.error || 'Error eliminando registro');
                }
                
            } catch (error) {
                console.error('Error eliminando registro:', error);
                showNotification('error', error.message);
            }
        }

        /**
         * Filtrar líderes
         */
        function filtrarLideres() {
            const estadoFiltro = document.getElementById('filtro-estado').value;
            const busqueda = document.getElementById('buscar-lider').value.toLowerCase();
            
            lideresFiltrados = todosLosLideres.filter(lider => {
                // Filtro por estado
                if (estadoFiltro !== 'todos' && lider.estado_biometrico !== estadoFiltro) {
                    return false;
                }
                
                // Filtro por búsqueda
                if (busqueda && !lider.nombre_completo.toLowerCase().includes(busqueda) && 
                    !lider.documento.includes(busqueda) && 
                    !lider.tipo_liderazgo.toLowerCase().includes(busqueda)) {
                    return false;
                }
                
                return true;
            });
            
            renderizarLideres();
        }

        /**
         * Toggle selección
         */
        function toggleSeleccion(documento) {
            if (seleccionados.has(documento)) {
                seleccionados.delete(documento);
            } else {
                seleccionados.add(documento);
            }
            renderizarLideres();
        }

        /**
         * Seleccionar todos
         */
        function seleccionarTodos() {
            const checkboxes = document.querySelectorAll('.leader-checkbox');
            const todosSeleccionados = Array.from(checkboxes).every(cb => cb.checked);
            
            if (todosSeleccionados) {
                seleccionados.clear();
            } else {
                lideresFiltrados.forEach(lider => {
                    if (lider.puede_registrar) {
                        seleccionados.add(lider.documento);
                    }
                });
            }
            
            renderizarLideres();
        }

        /**
         * Limpiar selección
         */
        function limpiarSeleccion() {
            seleccionados.clear();
            renderizarLideres();
        }

        /**
         * Actualizar acciones batch
         */
        function actualizarBatchActions() {
            const batchActions = document.getElementById('batch-actions');
            const selectionCount = document.getElementById('selection-count');
            
            if (seleccionados.size > 0) {
                batchActions.style.display = 'flex';
                selectionCount.textContent = `${seleccionados.size} seleccionados`;
            } else {
                batchActions.style.display = 'none';
            }
        }

        /**
         * Registrar seleccionados
         */
        function registrarSeleccionados() {
            showNotification('info', 'Función de registro masivo en desarrollo...');
        }

        /**
         * Sincronizar registros
         */
        async function sincronizarRegistros() {
            try {
                const response = await fetch('api/registro-biometrico-lider.php?action=sincronizar');
                const result = await response.json();
                
                if (result.success) {
                    showNotification('success', result.message);
                    await cargarLideresBiometricos();
                } else {
                    throw new Error(result.error || 'Error sincronizando');
                }
                
            } catch (error) {
                console.error('Error sincronizando:', error);
                showNotification('error', error.message);
            }
        }

        /**
         * Recargar datos
         */
        async function recargarDatos() {
            await cargarLideresBiometricos();
            showNotification('success', 'Datos actualizados');
        }

        /**
         * Mostrar notificación
         */
        function showNotification(type, message) {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 15px 20px;
                border-radius: 8px;
                color: white;
                font-weight: 600;
                z-index: 2000;
                animation: slideIn 0.3s ease;
                background: ${type === 'success' ? '#10b981' : type === 'error' ? '#ef4444' : '#f59e0b'};
                box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            `;
            notification.innerHTML = `
                <i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-triangle' : 'fa-info-circle'}" style="margin-right:8px;"></i>
                ${message}
            `;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

    </script>
</body>
</html>
